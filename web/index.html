<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Out Loud — text to speech in your browser</title>
    <meta
      name="description"
      content="Free, open-source AI text-to-speech that runs 100% in your browser. Powered by Kokoro-82M."
    />
    <meta name="theme-color" content="#000000" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loud.vinnymac.dev/" />
    <meta property="og:title" content="Out Loud — text to speech in your browser" />
    <meta
      property="og:description"
      content="Free, open-source AI text-to-speech that runs 100% in your browser. Powered by Kokoro-82M."
    />
    <meta property="og:image" content="https://loud.vinnymac.dev/icon-512.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Out Loud — text to speech in your browser" />
    <meta
      name="twitter:description"
      content="Free, open-source AI text-to-speech that runs 100% in your browser. Powered by Kokoro-82M."
    />
    <meta name="twitter:image" content="https://loud.vinnymac.dev/icon-512.png" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Cross-origin isolation (→ SharedArrayBuffer → multithreaded ONNX). Runs
         before the app so it can reload once to gain control on first visit. If
         it can't isolate, the engine just runs single-threaded. -->
    <script src="/coi-serviceworker.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
