name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to the same ref cancels the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend typecheck + format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps (prettier)
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Install Tauri frontend deps
        working-directory: tauri
        run: npm ci

      - name: Typecheck (vue-tsc)
        working-directory: tauri
        run: npm run typecheck

      - name: Build frontend (vite)
        working-directory: tauri
        run: npm run build

  engine:
    name: Engine unit tests
    runs-on: macos-14 # fast Apple Silicon runner (no scarce macos-13 dependency)
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tauri/src-tauri/engine -> target"

      - name: cmake
        run: brew install cmake || true

      # Pure-logic unit tests (tokenize/text/voices/audio). The ONNX integration
      # test self-skips without ORT_DYLIB_PATH, so no model/dylib is needed here.
      - name: cargo test
        working-directory: tauri/src-tauri/engine
        run: cargo test
