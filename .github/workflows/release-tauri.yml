name: Release (Tauri)

# Builds the native-Rust Tauri app (the engine replaces the old Node sidecar) and
# publishes a DRAFT GitHub Release. Mirrors release.yml's shape.
#
#   pull_request  -> build + DMG only (validates the pipeline; no release)
#   tag v* / dispatch -> build + (optional) sign + notarize + draft release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build/release (e.g. v2.1.0). Create it first with `git tag`."
        required: true
  pull_request:
    branches: [main]
    paths:
      - "tauri/**"
      - ".github/workflows/release-tauri.yml"

permissions:
  contents: write # to attach assets to the GitHub Release

jobs:
  build-macos:
    name: Build macOS (Intel x64)
    # Intel x64 is REQUIRED: the bundled ONNX Runtime is 1.20.1 (the last release
    # with a macOS x86_64 binary) and the engine links it for x64. (arm64 needs an
    # arm64 dylib + engine_host work — a future follow-up.)
    runs-on: macos-13
    timeout-minutes: 60
    env:
      # macOS Developer ID signing — OPTIONAL. Mapped from the repo's existing
      # secrets to the names Tauri/codesign expect. Signing + notarization are
      # SKIPPED unless APPLE_SIGNING_IDENTITY is set (add it as a secret, e.g.
      # "Developer ID Application: Your Name (TEAMID)"). Until then the build ships
      # ad-hoc-signed (Gatekeeper shows "unidentified developer"; right-click → Open).
      APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tauri/src-tauri -> target"

      # espeak-ng supplies the espeak-ng-data the engine bundles; cmake builds the
      # vendored espeak-ng C in espeak-rs-sys. (CI uses brew's latest 1.52.x — for
      # bit-reproducible phonemes, pin the formula version in a follow-up.)
      - name: Install espeak-ng + cmake
        run: brew install espeak-ng cmake

      - name: Install JS deps (frontend + build-time onnxruntime-node dylib)
        working-directory: tauri
        run: npm ci

      - name: Stage resources (ONNX dylib + espeak-ng-data + models + openapi)
        working-directory: tauri
        run: OUT_LOUD_ESPEAK_DATA="$(brew --prefix espeak-ng)/share/espeak-ng-data" npm run stage

      - name: Build app bundle (.app)
        working-directory: tauri
        run: npx tauri build

      # Deep-sign so the nested onnxruntime dylib is Developer-ID-signed + hardened
      # (required for notarization). UNTESTED in this repo — validate on the first
      # signed run; nested-binary signing is the usual sticking point.
      - name: Sign .app (Developer ID)
        if: ${{ github.event_name != 'pull_request' && env.APPLE_SIGNING_IDENTITY != '' }}
        run: |
          APP="tauri/src-tauri/target/release/bundle/macos/Out Loud.app"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package DMG (LZMA/ULMO)
        working-directory: tauri
        run: npm run dmg

      - name: Notarize + staple DMG
        if: ${{ github.event_name != 'pull_request' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' }}
        run: |
          DMG=$(ls "tauri/src-tauri/target/release/bundle/dmg/"*.dmg | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: out-loud-macos-x64
          path: tauri/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release (draft)
    needs: [build-macos]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten DMGs into a single folder
        run: |
          mkdir -p release-assets
          find artifacts -type f -name '*.dmg' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: false
