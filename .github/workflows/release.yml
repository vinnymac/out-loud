name: Release

# Builds the native-Rust Tauri app for macOS (Intel + Apple Silicon), Windows, and
# Linux, packs the Chrome extension, and publishes a DRAFT GitHub Release.
#
#   pull_request -> full matrix build (validates parity; no release)
#   tag v* / dispatch -> matrix build + (optional macOS sign/notarize) + draft release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build/release (e.g. v2.1.0). Create it first with `git tag`."
        required: true
  pull_request:
    branches: [main]
    paths:
      - "tauri/**"
      - "models/**"
      - "espeak-ng-data/**"
      - ".github/workflows/release.yml"

permissions:
  contents: write # to attach assets to the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x64 MUST be Intel (macos-13): onnxruntime is 1.20.1, the last
          # release with a macOS x86_64 binary.
          - {
              label: "macOS (Intel)",
              os: macos-13,
              bundles: "app",
              glob: "src-tauri/target/release/bundle/dmg/*.dmg",
            }
          - {
              label: "macOS (Apple Silicon)",
              os: macos-14,
              bundles: "app",
              glob: "src-tauri/target/release/bundle/dmg/*.dmg",
            }
          - {
              label: "Windows (x64)",
              os: windows-latest,
              bundles: "nsis",
              glob: "src-tauri/target/release/bundle/nsis/*-setup.exe",
            }
          - {
              label: "Linux (x64)",
              os: ubuntu-22.04,
              bundles: "deb",
              glob: "src-tauri/target/release/bundle/deb/*.deb",
            }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        working-directory: tauri
    env:
      # macOS Developer ID signing — OPTIONAL (skipped unless APPLE_SIGNING_IDENTITY
      # is set). Mapped from the repo's existing secrets to the names codesign expects.
      APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tauri/src-tauri -> target"

      # espeak-ng-data is vendored in the repo, so no system espeak install is
      # needed anywhere. We only need cmake (+ a C compiler) to build the vendored
      # espeak-ng C in espeak-rs-sys, and the Tauri/WebKit system libs on Linux.
      - name: Linux system deps
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf build-essential cmake libssl-dev

      - name: macOS deps (cmake)
        if: runner.os == 'macOS'
        working-directory: .
        run: brew install cmake || true

      - name: Install JS deps (frontend + build-time onnxruntime-node binary)
        run: npm ci

      - name: Stage resources (onnxruntime + espeak-ng-data + models + openapi)
        run: npm run stage

      - name: Build app bundle
        run: npx tauri build --bundles ${{ matrix.bundles }}

      # macOS-only: deep-sign (nested onnxruntime dylib + hardened runtime), package
      # the LZMA DMG, then notarize. All gated on APPLE_SIGNING_IDENTITY being set.
      - name: Sign .app (macOS, Developer ID)
        if: ${{ runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_IDENTITY != '' }}
        run: |
          APP="src-tauri/target/release/bundle/macos/Out Loud.app"
          codesign --force --deep --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package DMG (macOS, LZMA/ULMO)
        if: runner.os == 'macOS'
        run: npm run dmg

      - name: Notarize + staple DMG (macOS)
        if: ${{ runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' }}
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: out-loud-${{ matrix.os }}
          path: tauri/${{ matrix.glob }}
          if-no-files-found: error

  extensions:
    name: Pack Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Pack
        run: |
          mkdir -p releases/extensions
          cd chrome-extension
          zip -r ../releases/extensions/out-loud-chrome.zip . -x '*.DS_Store' -x 'node_modules/*'
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: releases/extensions/out-loud-chrome.zip

  release:
    name: Create GitHub Release (draft)
    needs: [build, extensions]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten into release-assets/
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.deb' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -la release-assets
      - name: Publish GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          draft: true
          fail_on_unmatched_files: false
